name: electricity_bill_estimator
description: Monthly Electricity Bill Estimator App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.2.4
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#37474F"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#37474F"
  image: assets/images/logo.png
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/